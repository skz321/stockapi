services:
  - type: web
    name: stockapi
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx prisma db seed
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
